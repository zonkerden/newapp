name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  android:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install dependencies
        run: npm ci
      - name: Build web assets
        run: npm run build
      - name: Ensure Android platform exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
      - name: Generate app icons and splash screen
        run: npx capacitor-assets generate --android --iconBackgroundColor "#10171a" --iconBackgroundColorDark "#10171a"
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
